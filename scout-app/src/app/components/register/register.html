<div routerLink="/" class="back">
  <span class="material-symbols-outlined arrow">
    arrow_back
  </span>
  <span>Back to home</span>
</div>

<div class="container">
  <div class="title">
    <div class="logo-container">
      <img class="logo" src="/pictures/logo-green.png">
      <h2>BePrepared</h2>
    </div>
    <p class="p1">Create Account</p>
    <p class="p2">Fill in your details to get started</p>
  </div>
  <form class="register-form">
    <div class="form-group">
      <label>Full Name *</label>
      <input [(ngModel)]="name" name="name" placeholder="Enter full name" />
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input [(ngModel)]="email" name="email" placeholder="Enter email" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Scout ID *</label>
        <input [(ngModel)]="scoutId" name="scoutId" placeholder="Scout ID" />
      </div>

      <div class="form-group">
        <label>Date of birth *</label>
        <input [(ngModel)]="dateOfBirth" name="dateOfBirth" type="date" />
      </div>
    </div>

    <div class="form-group">
      <label>Scout level *</label>
      <select [(ngModel)]="scoutLevel" name="scoutLevel" >
        <option>Lupisor</option>
        <option>Temerar</option>
        <option>Explorator</option>
        <option>Senior</option>
        <option>Lider</option>
      </select>
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" />
    </div>

    <div class="form-group">
      <label>Confirm password *</label>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm password" />
    </div>

    <button (click)="submit()" type="button" class="submit-btn" [disabled]="isLoading">
      <span *ngIf="isLoading">Loading...</span>
      <span *ngIf="!isLoading">Register</span>
    </button>

    <div>
      <span class="span1">
        Already have an account?
      </span>
      <span routerLink="/login" class="span2">
        Sign in!
      </span>
    </div>
  </form>
</div>

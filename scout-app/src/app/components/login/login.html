<div routerLink="/" class="back">
  <span class="material-symbols-outlined arrow">
    arrow_back
  </span>
  <span>Back to home</span>
</div>

<div class="container">
  <div class="title">
    <div class="logo-container">
      <img class="logo" src="/pictures/logo-green.png">
      <h2>BePrepared</h2>
    </div>
    <p class="p1">Welcome Back</p>
    <p class="p2">Sign in to your scout account</p>
  </div>
  <form class="register-form">
    <div class="form-group">
      <label>Email, scout ID or name</label>
      <input [(ngModel)]="email" name="email" placeholder="Enter email/scout ID/name" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" name="password" placeholder="Enter password" />
    </div>

    <button (click)="submit()" type="button" class="submit-btn">
      Sign In
    </button>

    <div>
      <span class="span1">
        Don't have an account?
      </span>
      <span routerLink="/register" class="span2">
        Sign up!
      </span>
    </div>
  </form>
</div>

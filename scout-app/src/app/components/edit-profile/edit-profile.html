<header class="header">
  <div class="logo-bar">
    <img class="logo" src="/pictures/logo-beige.png" alt="BePrepared logo">
    <span>BePrepared</span>
  </div>
  <div class="header-right">
    <button routerLink="/chat" class="header-btns">Chat</button>
    <button routerLink="/events" class="header-btns">All Events</button>
    <button routerLink="/myevents" class="header-btns">My Events</button>
    <button routerLink="/badges" class="header-btns">Badges</button>
    <button routerLink="/statistics" class="header-btns">Statistics</button>
    <button routerLink="/editprofile" class="current-btn">Profile</button>
    <button *ngIf="isAdmin" routerLink="/admin/observation" class="header-btns">Observations</button>
  </div>
</header>
<nav class="mobile-nav">
  <button routerLink="/chat" class="mobile-nav-btn">Chat</button>
  <button routerLink="/events" class="mobile-nav-btn">All Events</button>
  <button routerLink="/myevents" class="mobile-nav-btn">My Events</button>
  <button routerLink="/badges" class="mobile-nav-btn">Badges</button>
  <button routerLink="/statistics" class="mobile-nav-btn">Statistics</button>
  <button routerLink="/editprofile" class="mobile-nav-btn active">Profile</button>
  <button *ngIf="isAdmin" routerLink="/admin/observation" class="mobile-nav-btn">Observations</button>
</nav>

<main class="main-container">

      <div class="container">
        <div class="title">

          <p class="p1">Edit your profile</p>
        </div>
        <form class="register-form">
          <div class="form-group">
            <label>Full Name *</label>
            <input placeholder="Enter full name" />
          </div>




          <div class="form-group">
            <label>Date of birth *</label>
            <input type="date" />
          </div>


          <div class="form-group">
            <label>Scout level *</label>
            <select>
              <option>Lupisor</option>
              <option>Temerar</option>
              <option>Explorator</option>
              <option>Senior</option>
              <option>Lider</option>
            </select>
          </div>


          <button routerLink="/events" type="button" class="submit-btn">
            Save
          </button>

          <button (click)="logout()" type="button" class="submit-btn">
            Logout
          </button>

        </form>
      </div>
</main>
